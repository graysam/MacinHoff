name: MacinHoff
options:
  bundleIdPrefix: com.sam
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    PRODUCT_NAME: MacinHoff
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SDKROOT: macosx
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridge/MacinHoff-Bridging-Header.h
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_OBJC_ARC: YES
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)/Sources/Core/include
      - /opt/homebrew/include
      - /opt/homebrew/include/libhackrf
    LIBRARY_SEARCH_PATHS:
      - /opt/homebrew/lib
    OTHER_LDFLAGS:
      - -lhackrf
    FRAMEWORK_SEARCH_PATHS:
      - $(inherited)
targets:
  MacinHoff:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Bridge
      - path: Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.MacinHoff
        INFOPLIST_KEY_CFBundleDisplayName: MacinHoff
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
